name: .NET Core Desktop

on:
  push:
    branches: [ "MasterMainBranch" ]
  pull_request:
    branches: [ "MasterMainBranch" ]

jobs:
  build:
    strategy:
      matrix:
    
        configuration: [Debug, Release]

    runs-on: windows-latest  

    env:
      Solution_Name: CyberChat.sln                     
      # FIXED: Added missing variables required by the steps below
      Wap_Project_Directory: .
      Wap_Project_Path: CyberChat.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # FIXED: Reordered. You must restore dependencies BEFORE running tests or builds
    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # FIXED: Explicitly targeting your solution file ensures it executes flawlessly
    - name: Execute unit tests
      run: dotnet test $env:Solution_Name --configuration ${{ matrix.configuration }} --no-restore


    
    - name: Decode the pfx
      if: false # Set to true only if secrets are configured in the repo
      run: |
        $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
        $certificatePath = Join-Path -Path $env:Wap_Project_Directory -ChildPath GitHubActionsWorkflow.pfx
        [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)

    - name: Create the app package
      if: false #
      run: msbuild $env:Wap_Project_Path /p:Configuration=$env:Configuration /p:UapAppxPackageBuildMode=$env:Appx_Package_Build_Mode /p:AppxBundle=$env:Appx_Bundle /p:PackageCertificateKeyFile=GitHubActionsWorkflow.pfx /p:PackageCertificatePassword=${{ secrets.Pfx_Key }}
      env:
        Appx_Bundle: Always
        Appx_Bundle_Platforms: x86|x64
        Appx_Package_Build_Mode: StoreUpload
        Configuration: ${{ matrix.configuration }}

    - name: Remove the pfx
      if: false # Set to true only if secrets are configured in the repo
      run: Remove-Item -path $env:Wap_Project_Directory\GitHubActionsWorkflow.pfx -ErrorAction Ignore

    - name: Upload build artifacts
      if: false # Set to true only if packaging succeeded
      uses: actions/upload-artifact@v4
      with:
        name: MSIX Package
        path: ${{ env.Wap_Project_Directory }}\AppPackages
